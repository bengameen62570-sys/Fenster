<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden | AluForm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="error-page">
  <div class="container" style="max-width:520px;">
    <div class="profile-scene" role="img" aria-label="Querschnitt eines Aluminiumprofils">
      <div class="glow"></div>
      <div class="profile-cut">
        <svg viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
          <rect x="20" y="20" width="60" height="220" rx="6" fill="#8b9096"/>
          <rect x="32" y="20" width="12" height="220" fill="#c7ccd1"/>
          <rect x="70" y="60" width="14" height="140" fill="#d98a4d"/>
          <rect x="220" y="20" width="60" height="220" rx="6" fill="#8b9096"/>
          <rect x="256" y="20" width="12" height="220" fill="#c7ccd1"/>
          <rect x="216" y="60" width="14" height="140" fill="#d98a4d"/>
          <rect x="94" y="70" width="112" height="120" fill="#bcd6e8" fill-opacity=".55" stroke="#5b6268" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="profile-shine"></div>
    </div>
    <p class="eyebrow" style="justify-content:center;">Fehler 404</p>
    <h1>Diese Seite fehlt — wie ein Profil ohne Rahmen.</h1>
    <p>Die aufgerufene Seite existiert nicht oder wurde verschoben. Zurück geht's hier entlang.</p>
    <a href="/index.html" class="btn btn-primary"><span>Zur Startseite</span></a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
